  <div class="article-content">
    <p>一看一乐,非原创</p>
<figure class="highlight text"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br></pre></td><td class="code"><pre><span class="line">于谦的爸爸王老爷子姓孙名叫李秀珍号欧阳青松人称罩百灵。也叫于小谦、于得水、于进锅、于香肉丝、于德刚，或者郭德纲。需知道于谦</span><br><span class="line">的爸爸不等于于谦的父亲，每十个北京人有一个是于谦的父亲听相声的都是于谦的父亲。于谦的亲爹老翟头是书香门第，平日手不释卷最爱</span><br><span class="line">读《金瓶梅》插图本；也是宦官之后，满清最后一个shan人，出身满洲尿黄旗，满名爱新觉罗·筐，八大铁帽子王之绿帽子王世袭罔替！排</span><br><span class="line">第八人称京八爷或京八，美髯长二丈余，自幼习武，师从西门吹灯、少林寺驻武当山办事处大神父王喇嘛小咖喱黄不辣，寒暑不侵，一团上</span><br><span class="line">午的精神！精于轻功，诨名草上飞，又一手开锁绝活，一包方便面开一个小区，刀枪剑戟煎炒烹炸，持修垫剜眼刀，刀法肉上雕花融北京济</span><br><span class="line">南扬州三派，杀人于无形当时下地全无痛觉。耍剑无出其右，兵器为大宝剑，人剑合一，也叫剑人；独门暗器藏镖，纵使一丝不挂也能从身</span><br><span class="line">后摸出一镖，令人防不胜防。江湖人称朝鲜冷面杀手，韩名朴人勇，膝下一子朴一生就是谦哥；毕业于保定军校，专业推火烧战车，戎马一</span><br><span class="line">生，孤陷贼船，勇开一千万*河蟹*，大富大贵，是杨梅大仓的公公夫人是果子李的*河蟹*亲家贵至蒙古国海军司令。住皮条胡同老拉家四合</span><br><span class="line">院，因爱扒丫鬟衣服被尊称巴依老爷。三大爱好是；花钱，洗头房和猪大肠（红烧清蒸刺身）。生活讲究，洗澡要洗清华池头一水，上公厕</span><br><span class="line">要换便服带随从和点心盒子，只吃自己肥料种的菜，别人的吃不惯；爱护晚辈，亲自教郭德纲尿和泥，炮**，用胡子给娃当跳绳，陪谦儿和</span><br><span class="line">谦媳妇睡觉，睡中间用一帘把谦哥隔开；多才艺，擅画黑扇面；身体好，虽然高龄七十三八十四但一顿火锅吃二十多盘肉四十多盘菜，每天</span><br><span class="line">早上八点半准时排便，九点钟准时起床。</span><br><span class="line">同仁堂开的本是老药铺</span><br><span class="line">先生这好比甩手自在王</span><br><span class="line">药王爷就在当中坐</span><br><span class="line">十大名医列两旁</span><br><span class="line">先拜这个药王后拜你</span><br><span class="line">你是药王爷的大徒弟</span><br><span class="line">哎药王爷 本姓孙</span><br><span class="line">提龙跨虎 手捻着针</span><br><span class="line">内科的先生孙思邈</span><br><span class="line">外科的先生华佗高</span><br><span class="line">孙思邈 华佗高</span><br><span class="line">三十二岁保唐朝</span><br><span class="line">正宫的国母得了病</span><br><span class="line">我是走线号脉治好了</span><br><span class="line">一针治好娘娘的病</span><br><span class="line">两针扎好了龙一条</span><br><span class="line">万岁一见龙心喜</span><br><span class="line">传旨封他在当朝</span><br><span class="line">封他个文官他不要</span><br><span class="line">封他个武将他把头摇</span><br><span class="line">万般出在了无计奈</span><br><span class="line">这才是钦赐那黄袍</span><br><span class="line">在一旁怒恼哪一位</span><br><span class="line">怒恼了敬德老英豪</span><br><span class="line">为臣我东挡西杀南征北战</span><br><span class="line">跨马抡鞭功劳大</span><br><span class="line">我主万岁 瞧不着</span><br><span class="line">小小的先生治好娘娘的病</span><br><span class="line">我主钦赐那黄袍</span><br><span class="line">革职为民臣不要</span><br><span class="line">黄袍的事情我不饶</span><br><span class="line">哎 老敬德 越说越恼越有气</span><br><span class="line">手提着钢鞭赶黄袍</span><br><span class="line">一赶赶到了八里桥</span><br><span class="line">药王爷 妙法高</span><br><span class="line">脱下了黄袍换红袍</span><br><span class="line">这个黄袍供到药王阁</span><br><span class="line">黎民百姓才把香烧</span><br><span class="line">您老这个买卖有栏柜</span><br><span class="line">您老栏柜本是三尺三寸三分高</span><br><span class="line">这边放着个轧药碾</span><br><span class="line">那边摆着个铡药刀</span><br><span class="line">铡药的刀 亮堂堂</span><br><span class="line">几味草药您先尝</span><br><span class="line">先铡这个牛黄与狗宝</span><br><span class="line">后铡槟榔与麝香</span><br><span class="line">桃仁陪着杏仁睡</span><br><span class="line">二仁躺在沉香床</span><br><span class="line">睡到三更茭白叶</span><br><span class="line">胆大的木贼跳进了墙</span><br><span class="line">盗走了水银五十两</span><br><span class="line">那个金毛狗儿叫汪汪</span><br><span class="line">有丁香去送信</span><br><span class="line">人参这才坐大堂</span><br><span class="line">佛手抄起了甘草棍</span><br><span class="line">棍棍打在陈皮上</span><br><span class="line">打得这个陈皮流鲜血</span><br><span class="line">鲜血甩在了木瓜上</span><br><span class="line">大风丸 小风丸</span><br><span class="line">胖大海那个滴溜圆</span><br><span class="line">那个狗皮膏药贴风寒</span><br><span class="line">有一天丸 二地丸 三肾丸</span><br><span class="line">还有槟榔四消丸 五虎丸</span><br><span class="line">六神丸 七真丸 八宝丸</span><br><span class="line">九龙丸 还有十全大补丸</span><br><span class="line">我有心接着药名往下唱</span><br><span class="line">我唱到明儿个唱不完</span><br><span class="line">我唱的是</span><br><span class="line">祝大家身体健康 福寿双全</span><br></pre></td></tr></table></figure>
